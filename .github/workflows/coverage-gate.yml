name: coverage-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install package and coverage tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" coverage>=7.10 mutmut>=2.4.5

      - name: Run tests with branch coverage
        env:
          CI: "true"
        run: |
          coverage run -m pytest testing/test_assertion.py testing/test_collection.py -q
          coverage combine
          coverage report -m
          coverage xml -o coverage.xml
          coverage json -o coverage.json

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        continue-on-error: true
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage.json
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          fail_ci_if_error: false
          files: ./coverage.xml
          verbose: true

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install package and mutmut
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" mutmut>=2.4.5

      - name: Run mutation testing on core modules
        continue-on-error: true
        run: |
          mutmut run --paths-to-mutate=src/_pytest/_code/source.py --tests-dir=testing/code
          mutmut results > mutmut-results.txt || true

      - name: Upload mutation results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        continue-on-error: true
        with:
          name: mutation-reports
          path: |
            mutmut-results.txt
            .mutmut-cache
          retention-days: 30
