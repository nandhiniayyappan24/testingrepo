[gate]
# Minimal pytest config for taxonomy/confidence-engine scanners.
minversion = "2.0"
testpaths = ["gate_tests"]
python_files = ["test_*.py"]
addopts = [
    "-q",
    "--cov=src",
    "--cov-branch",
    "--cov-report=xml:coverage.xml",
    "--cov-report=json:coverage.json",
    "--cov-report=term-missing:skip-covered",
]
